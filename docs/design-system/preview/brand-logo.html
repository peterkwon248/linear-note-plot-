<!doctype html>
<html><head><meta charset="utf-8"><title>Brand Mark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:18px;background:var(--background);font-family:var(--font-sans);color:var(--foreground);display:flex;align-items:center;gap:20px}
.b{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px}
.mark{width:32px;height:32px}
.wordmark{font-size:20px;font-weight:600;letter-spacing:-0.02em}
.dark{background:#141417;color:#fafafa}
.spec{font-family:var(--font-mono);font-size:10.5px;color:var(--muted-foreground);margin-top:6px}
</style></head>
<body>
<div>
  <div class="b"><img class="mark" src="../assets/plot-icon.svg" alt=""><span class="wordmark">Plot</span></div>
  <div class="spec" style="padding:0 14px">light · auto-contrast mark</div>
</div>
<div>
  <div class="b dark"><img class="mark" src="../assets/plot-icon.svg" alt=""><span class="wordmark">Plot</span></div>
  <div class="spec" style="padding:0 14px">dark · flips via prefers-color-scheme</div>
</div>
</body></html>
