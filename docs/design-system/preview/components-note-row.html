<!doctype html>
<html><head><meta charset="utf-8"><title>Note List Row</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:12px;background:var(--background);font-family:var(--font-sans);color:var(--foreground)}
.list{display:flex;flex-direction:column}
.row{display:grid;grid-template-columns:18px 16px 56px 1fr auto auto auto;gap:10px;align-items:center;height:36px;padding:0 12px;border-radius:6px;cursor:pointer;transition:background 160ms}
.row:hover{background:rgba(0,0,0,.03)}
.row.sel{background:rgba(94,106,210,.08)}
.chk{width:14px;height:14px;border:1.5px solid var(--border);border-radius:3px;opacity:0;transition:opacity 160ms}
.row:hover .chk,.row.sel .chk{opacity:1}
.row.sel .chk{background:var(--accent);border-color:var(--accent)}
.ic{width:14px;height:14px;color:var(--muted-foreground)}
.id{font-family:var(--font-mono);font-size:12px;color:var(--muted-foreground)}
.title{font-size:14px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.tag{font-size:11px;padding:1px 6px;border-radius:4px;background:#ede9fe;color:#6d28d9;font-weight:500}
.meta{font-size:12px;color:var(--muted-foreground);font-variant-numeric:tabular-nums}
.more{color:var(--muted-foreground);opacity:0;transition:opacity 160ms}
.row:hover .more{opacity:1}
svg{stroke:currentColor;stroke-width:1.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
</style></head>
<body>
<div class="list">
  <div class="row"><div class="chk"></div><svg class="ic" viewBox="0 0 24 24"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg><span class="id">NOT-214</span><span class="title">Zettelkasten vs PARA — a honest comparison</span><span class="tag">method</span><span class="meta">2d</span><svg class="more" viewBox="0 0 24 24" style="width:14px;height:14px"><circle cx="5" cy="12" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/><circle cx="19" cy="12" r="1.5" fill="currentColor"/></svg></div>
  <div class="row sel"><div class="chk"></div><svg class="ic" viewBox="0 0 24 24"><path d="M6 3h12l4 6-10 13L2 9Z"/><path d="M2 9h20"/></svg><span class="id">NOT-213</span><span class="title">Opacity hierarchy is a design primitive</span><span class="tag" style="background:#ecfccb;color:#4d7c0f">design</span><span class="meta">5d</span><svg class="more" viewBox="0 0 24 24" style="width:14px;height:14px"><circle cx="5" cy="12" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/><circle cx="19" cy="12" r="1.5" fill="currentColor"/></svg></div>
  <div class="row"><div class="chk"></div><svg class="ic" viewBox="0 0 24 24"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg><span class="id">NOT-212</span><span class="title">Ship crumbs, not loaves</span><span class="tag" style="background:#fef3c7;color:#b45309">writing</span><span class="meta">1w</span></div>
</div>
</body></html>
