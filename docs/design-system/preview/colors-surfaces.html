<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Colors — Core Surfaces</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 16px; background: var(--background); color: var(--foreground); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .sw { display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 56px; border-radius: 8px; border: 1px solid var(--border-subtle); }
  .name { font-size: 11px; font-weight: 600; letter-spacing: 0.04em; color: var(--foreground); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--muted-foreground); }
</style>
</head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#ffffff"></div><div class="name">background</div><div class="hex">#ffffff</div></div>
    <div class="sw"><div class="chip" style="background:#f7f8fa"></div><div class="name">card</div><div class="hex">#f7f8fa</div></div>
    <div class="sw"><div class="chip" style="background:#f5f5f7"></div><div class="name">sidebar</div><div class="hex">#f5f5f7</div></div>
    <div class="sw"><div class="chip" style="background:#f0f1f4"></div><div class="name">muted</div><div class="hex">#f0f1f4</div></div>
    <div class="sw"><div class="chip" style="background:#141417"></div><div class="name">background · dark</div><div class="hex">#141417</div></div>
    <div class="sw"><div class="chip" style="background:#1c1c20"></div><div class="name">card / sidebar · dark</div><div class="hex">#1c1c20</div></div>
    <div class="sw"><div class="chip" style="background:#222226"></div><div class="name">popover · dark</div><div class="hex">#222226</div></div>
    <div class="sw"><div class="chip" style="background:#27272a"></div><div class="name">muted · dark</div><div class="hex">#27272a</div></div>
  </div>
</body>
</html>
