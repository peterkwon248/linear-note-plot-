<!doctype html>
<html><head><meta charset="utf-8"><title>Type — Body & UI</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:18px 22px;background:var(--background);color:var(--foreground);font-family:var(--font-sans)}
.row{display:flex;align-items:baseline;gap:14px;padding:6px 0}
.spec{font-family:var(--font-mono);font-size:11px;color:var(--muted-foreground);width:88px;flex-shrink:0}
</style></head>
<body>
<div class="row"><div class="spec">15 / 1.75</div><div style="font-size:15px;line-height:1.75;letter-spacing:-0.01em">Editor body — the note you write. Calm, legible, slightly dense.</div></div>
<div class="row"><div class="spec">15 / 1.45</div><div style="font-size:15px">UI row — sidebar nav, list rows, section headers</div></div>
<div class="row"><div class="spec">14 / 1.5</div><div style="font-size:14px">Body default — buttons, menu items, inputs</div></div>
<div class="row"><div class="spec">13 / 1.5</div><div style="font-size:13px;color:var(--muted-foreground)">Note / secondary — captions, metadata</div></div>
<div class="row"><div class="spec">12</div><div style="font-size:12px;color:var(--muted-foreground)">Tiny — counts, timestamps, tooltips</div></div>
<div class="row"><div class="spec">11 / 0.08em</div><div style="font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted-foreground)">Eyebrow label</div></div>
</body></html>
