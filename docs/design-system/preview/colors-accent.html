<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Colors — Accent & Semantic</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 16px; background: var(--background); color: var(--foreground); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .sw { display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 52px; border-radius: 8px; border: 1px solid var(--border-subtle); position: relative; }
  .name { font-size: 11px; font-weight: 600; color: var(--foreground); }
  .hex { font-family: var(--font-mono); font-size: 10.5px; color: var(--muted-foreground); }
</style>
</head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#5e6ad2"></div><div class="name">accent</div><div class="hex">#5e6ad2</div></div>
    <div class="sw"><div class="chip" style="background:#6366f1"></div><div class="name">accent · dark</div><div class="hex">#6366f1</div></div>
    <div class="sw"><div class="chip" style="background:#e5484d"></div><div class="name">destructive</div><div class="hex">#e5484d</div></div>
    <div class="sw"><div class="chip" style="background:#45d483"></div><div class="name">success</div><div class="hex">#45d483</div></div>
    <div class="sw"><div class="chip" style="background:#f2994a"></div><div class="name">warning</div><div class="hex">#f2994a</div></div>
    <div class="sw"><div class="chip" style="background:#26b5ce"></div><div class="name">info</div><div class="hex">#26b5ce</div></div>
    <div class="sw"><div class="chip" style="background:#d97706"></div><div class="name">priority-med</div><div class="hex">#d97706</div></div>
    <div class="sw"><div class="chip" style="background:#7c3aed"></div><div class="name">wiki-complete</div><div class="hex">#7c3aed</div></div>
    <div class="sw"><div class="chip" style="background:#1a1a2e"></div><div class="name">foreground</div><div class="hex">#1a1a2e</div></div>
    <div class="sw"><div class="chip" style="background:#6b7280"></div><div class="name">muted-fg</div><div class="hex">#6b7280</div></div>
    <div class="sw"><div class="chip" style="background:#e2e3e8"></div><div class="name">border</div><div class="hex">#e2e3e8</div></div>
    <div class="sw"><div class="chip" style="background:#fafafa"></div><div class="name">foreground · dk</div><div class="hex">#fafafa</div></div>
  </div>
</body>
</html>
