<!doctype html>
<html><head><meta charset="utf-8"><title>Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:18px;background:var(--background);font-family:var(--font-sans);color:var(--foreground)}
.group{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
label{font-size:11px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:var(--muted-foreground)}
.input{height:34px;padding:0 12px;border:1px solid var(--border);border-radius:6px;background:var(--background);font-size:14px;font-family:inherit;color:var(--foreground);outline:0;transition:box-shadow 160ms,border-color 160ms;width:100%;box-sizing:border-box}
.input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(94,106,210,.25)}
.input.filled{border-color:var(--accent)}
.search{display:flex;align-items:center;gap:8px}
.kbd{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;padding:0 5px;border:1px solid var(--border);background:var(--card);border-radius:4px;font-family:var(--font-mono);font-size:11px;color:var(--muted-foreground)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
</style></head>
<body>
<div class="row">
  <div class="group"><label>Rest</label><input class="input" placeholder="Search notes…"></div>
  <div class="group"><label>Focus</label><input class="input filled" value="capture" style="box-shadow:0 0 0 3px rgba(94,106,210,.25);border-color:#5e6ad2"></div>
</div>
<div class="group" style="margin-top:6px"><label>With shortcut</label>
  <div style="display:flex;align-items:center;gap:8px;padding:0 10px 0 12px;height:34px;border:1px solid var(--border);border-radius:6px;background:var(--background)">
    <span style="color:var(--muted-foreground);font-size:13px">Search anything</span>
    <span style="flex:1"></span>
    <span class="kbd">⌘</span><span class="kbd">K</span>
  </div>
</div>
</body></html>
