<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:18px 22px;background:var(--background);font-family:var(--font-sans)}
.row{display:flex;align-items:center;gap:12px;padding:5px 0}
.bar{background:var(--accent);height:10px;border-radius:2px}
.v{font-family:var(--font-mono);font-size:11px;color:var(--muted-foreground);width:36px}
.n{font-size:12px;color:var(--foreground)}
</style></head>
<body>
<div class="row"><div class="v">4</div><div class="bar" style="width:4px"></div><div class="n">xs — inline gap</div></div>
<div class="row"><div class="v">6</div><div class="bar" style="width:6px"></div><div class="n">between icon + text</div></div>
<div class="row"><div class="v">8</div><div class="bar" style="width:8px"></div><div class="n">small element gap</div></div>
<div class="row"><div class="v">12</div><div class="bar" style="width:12px"></div><div class="n">card padding (compact)</div></div>
<div class="row"><div class="v">16</div><div class="bar" style="width:16px"></div><div class="n">card padding (default)</div></div>
<div class="row"><div class="v">20</div><div class="bar" style="width:20px"></div><div class="n">section gap</div></div>
<div class="row"><div class="v">24</div><div class="bar" style="width:24px"></div><div class="n">container padding</div></div>
<div class="row"><div class="v">32</div><div class="bar" style="width:32px"></div><div class="n">major section gap</div></div>
<div class="row"><div class="v">48</div><div class="bar" style="width:48px"></div><div class="n">editor padding-x</div></div>
</body></html>
