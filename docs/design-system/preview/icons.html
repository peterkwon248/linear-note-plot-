<!doctype html>
<html><head><meta charset="utf-8"><title>Plot Icons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:16px;background:var(--background);font-family:var(--font-sans);color:var(--foreground)}
.grid{display:grid;grid-template-columns:repeat(10,1fr);gap:10px}
.c{display:flex;flex-direction:column;align-items:center;gap:5px;padding:8px 4px;border-radius:6px}
svg{stroke:currentColor;stroke-width:1.5;fill:none;stroke-linecap:round;stroke-linejoin:round;color:var(--foreground)}
.n{font-size:10px;color:var(--muted-foreground);text-align:center}
</style></head>
<body>
<div class="grid">
<div class="c"><svg width="20" height="20" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><div class="n">Home</div></div>
<div class="c"><svg width="20" height="20" viewBox="0 0 24 24"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg><div class="n">Inbox</div></div>
<div class="c"><svg width="20" height="20" viewBox="0 0 24 24"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="12" y2="17"/></svg><div class="n">Notes</div></div>

<div class="c"><svg width="20" height="20" viewBox="0 0 24 24"><circle cx="12" cy="5" r="2.5"/><circle cx="5" cy="19" r="2.5"/><circle cx="19" cy="19" r="2.5"/><line x1="12" y1="7.5" x2="5" y2="16.5"/><line x1="12" y1="7.5" x2="19" y2="16.5"/><line x1="7.5" y1="19" x2="16.5" y2="19"/></svg><div class="n">Graph</div></div>

<div class="c"><svg width="20" height="20" viewBox="0 0 24 24"><line x1="4" y1="6" x2="16" y2="6"/><line x1="4" y1="12" x2="12" y2="12"/><line x1="4" y1="18" x2="8" y2="18"/></svg><div class="n">Sort</div></div>

<div class="c"><svg width="20" height="20" viewBox="0 0 24 24"><path d="M2 4h6l-6 8h6"/><path d="M12 8h8l-8 10h8"/></svg><div class="n">Snooze</div></div>
<div class="c"><svg width="20" height="20" viewBox="0 0 24 24"><path d="M12 2 L14.5 9 L22 9.5 L16 14.5 L18 22 L12 17.5 L6 22 L8 14.5 L2 9.5 L9.5 9Z"/></svg><div class="n">Sparkle</div></div>
</div>
</body></html>
