<!doctype html>
<html><head><meta charset="utf-8"><title>Badges & Keys</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:18px;background:var(--background);font-family:var(--font-sans)}
.row{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.b{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:12px;font-weight:500;border:1px solid transparent}
.default{background:#1a1a2e;color:#fff}
.secondary{background:#f0f1f4;color:#1a1a2e}
.outline{color:var(--foreground);border-color:var(--border)}
.destructive{background:#e5484d;color:#fff}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.kbd{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;padding:0 5px;border:1px solid var(--border);background:var(--card);border-radius:4px;font-family:var(--font-mono);font-size:11px;color:var(--muted-foreground)}
.label{font-size:10.5px;color:var(--muted-foreground);width:66px;font-family:var(--font-mono)}
</style></head>
<body>
<div class="row"><div class="label">badge</div><span class="b default">Permanent</span><span class="b secondary">Capture</span><span class="b outline">Inbox</span><span class="b destructive">Overdue</span></div>
<div class="row"><div class="label">status</div><span class="b outline"><span class="dot" style="background:#45d483"></span>Ready</span><span class="b outline"><span class="dot" style="background:#f2994a"></span>Snoozed</span><span class="b outline"><span class="dot" style="background:#6b7280"></span>Idle</span><span class="b outline"><span class="dot" style="background:#7c3aed"></span>Due</span></div>
<div class="row"><div class="label">kbd</div><span class="kbd">⌘</span><span class="kbd">K</span><span class="kbd">J</span><span class="kbd">K</span><span class="kbd">G</span><span class="kbd">I</span><span class="kbd">Space</span><span class="kbd">Esc</span></div>
</body></html>
