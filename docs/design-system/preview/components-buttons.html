<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:18px;background:var(--background);font-family:var(--font-sans)}
.row{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:8px;height:32px;padding:0 12px;border-radius:6px;font-size:14px;font-weight:500;cursor:pointer;transition:background 160ms ease,color 160ms ease;border:0;font-family:inherit}
.default{background:#1a1a2e;color:#fff}
.default:hover{background:rgba(26,26,46,.9)}
.outline{background:transparent;color:var(--foreground);border:1px solid var(--border);box-shadow:0 1px 1px rgba(0,0,0,.04)}
.outline:hover{background:rgba(0,0,0,.03)}
.secondary{background:#f0f1f4;color:#1a1a2e}
.secondary:hover{background:rgba(0,0,0,.04)}
.ghost{background:transparent;color:var(--foreground)}
.ghost:hover{background:rgba(0,0,0,.03)}
.destructive{background:#e5484d;color:#fff}
.destructive:hover{background:rgba(229,72,77,.9)}
.sm{height:28px;padding:0 10px;font-size:13px}
.lg{height:40px;padding:0 20px;font-size:15px}
.icon{width:32px;padding:0;justify-content:center}
.label{font-size:10.5px;color:var(--muted-foreground);width:56px;font-family:var(--font-mono)}
</style></head>
<body>
<div class="row"><div class="label">variant</div><button class="btn default">New Note</button><button class="btn outline">Filter</button><button class="btn secondary">Snooze</button><button class="btn ghost">Cancel</button><button class="btn destructive">Delete</button></div>
<div class="row"><div class="label">size</div><button class="btn default sm">Small</button><button class="btn default">Default</button><button class="btn default lg">Large</button><button class="btn outline icon">+</button><button class="btn outline icon sm">⌘</button></div>
</body></html>
