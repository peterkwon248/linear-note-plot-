<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Magazine Column Palette</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 16px; background: var(--background); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; }
  .sw { display: flex; flex-direction: column; align-items: stretch; gap: 4px; }
  .chip { height: 46px; border-radius: 8px; display: flex; align-items: flex-end; padding: 6px 8px; }
  .name { font-size: 10px; font-weight: 600; color: var(--foreground); text-align: center; }
</style>
</head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#f1f5f9;color:#475569"><span style="font-size:9px;font-weight:700">Aa</span></div><div class="name">slate</div></div>
    <div class="sw"><div class="chip" style="background:#ecfccb;color:#4d7c0f"><span style="font-size:9px;font-weight:700">Aa</span></div><div class="name">sage</div></div>
    <div class="sw"><div class="chip" style="background:#fce7f3;color:#be185d"><span style="font-size:9px;font-weight:700">Aa</span></div><div class="name">blush</div></div>
    <div class="sw"><div class="chip" style="background:#fef3c7;color:#b45309"><span style="font-size:9px;font-weight:700">Aa</span></div><div class="name">sand</div></div>
    <div class="sw"><div class="chip" style="background:#e0f2fe;color:#0369a1"><span style="font-size:9px;font-weight:700">Aa</span></div><div class="name">sky</div></div>
    <div class="sw"><div class="chip" style="background:#ede9fe;color:#6d28d9"><span style="font-size:9px;font-weight:700">Aa</span></div><div class="name">lavender</div></div>
    <div class="sw"><div class="chip" style="background:#ffedd5;color:#c2410c"><span style="font-size:9px;font-weight:700">Aa</span></div><div class="name">peach</div></div>
    <div class="sw"><div class="chip" style="background:#f4f4f5;color:#52525b"><span style="font-size:9px;font-weight:700">Aa</span></div><div class="name">ash</div></div>
    <div class="sw"><div class="chip" style="background:#d1fae5;color:#047857"><span style="font-size:9px;font-weight:700">Aa</span></div><div class="name">mint</div></div>
    <div class="sw"><div class="chip" style="background:#ffe4e6;color:#be123c"><span style="font-size:9px;font-weight:700">Aa</span></div><div class="name">coral</div></div>
    <div class="sw"><div class="chip" style="background:#dbeafe;color:#1d4ed8"><span style="font-size:9px;font-weight:700">Aa</span></div><div class="name">ocean</div></div>
    <div class="sw"><div class="chip" style="background:#f3e8ff;color:#7e22ce"><span style="font-size:9px;font-weight:700">Aa</span></div><div class="name">wine</div></div>
    <div class="sw"><div class="chip" style="background:#ecfccb;color:#65a30d"><span style="font-size:9px;font-weight:700">Aa</span></div><div class="name">lime</div></div>
    <div class="sw"><div class="chip" style="background:#e0e7ff;color:#4338ca"><span style="font-size:9px;font-weight:700">Aa</span></div><div class="name">iris</div></div>
    <div class="sw"><div class="chip" style="background:#fefce8;color:#a16207"><span style="font-size:9px;font-weight:700">Aa</span></div><div class="name">cream</div></div>
    <div class="sw"><div class="chip" style="background:#e5e7eb;color:#374151"><span style="font-size:9px;font-weight:700">Aa</span></div><div class="name">charcoal</div></div>
  </div>
</body>
</html>
