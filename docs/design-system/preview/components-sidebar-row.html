<!doctype html>
<html><head><meta charset="utf-8"><title>Sidebar Row States</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:14px;background:#1c1c20;font-family:var(--font-sans);color:rgba(255,255,255,.65)}
.nav{display:flex;flex-direction:column;gap:2px;width:230px}
.row{display:flex;align-items:center;gap:10px;height:28px;padding:0 10px;border-radius:6px;font-size:14px;cursor:pointer;transition:background 160ms,color 160ms}
.row .ic{width:16px;height:16px;color:rgba(255,255,255,.55)}
.row .count{margin-left:auto;font-size:12px;color:rgba(255,255,255,.45);font-variant-numeric:tabular-nums}
.row.hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.85)}
.row.hover .ic{color:rgba(255,255,255,.75)}
.row.active{background:rgba(255,255,255,.08);color:rgba(255,255,255,.93)}
.row.active .ic{color:rgba(255,255,255,.93)}
.sec{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,.45);padding:10px 10px 4px}
svg{stroke:currentColor;stroke-width:1.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
</style></head>
<body>
<div class="nav">
  <div class="row"><svg class="ic" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</div>
  <div class="row hover"><svg class="ic" viewBox="0 0 24 24"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>Inbox <span class="count">14</span></div>
  <div class="row active"><svg class="ic" viewBox="0 0 24 24"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>Capture <span class="count">37</span></div>
  <div class="row"><svg class="ic" viewBox="0 0 24 24"><path d="M6 3h12l4 6-10 13L2 9Z"/><path d="M2 9h20"/></svg>Permanent <span class="count">216</span></div>
  <div class="sec">Favorites</div>
  <div class="row"><svg class="ic" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>Design research</div>
</div>
</body></html>
