<!doctype html>
<html><head><meta charset="utf-8"><title>Type — Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:18px 22px;background:var(--background);color:var(--foreground);font-family:var(--font-sans)}
.row{display:flex;align-items:baseline;gap:14px;padding:7px 0;border-bottom:1px dashed var(--border-subtle)}
.row:last-child{border:0}
.spec{font-family:var(--font-mono);font-size:11px;color:var(--muted-foreground);width:90px;flex-shrink:0}
</style></head>
<body>
<div class="row"><div class="spec">28 / 600</div><h1 style="margin:0">Heading one — page title</h1></div>
<div class="row"><div class="spec">23 / 600</div><h2 style="margin:0">Heading two — section</h2></div>
<div class="row"><div class="spec">19 / 600</div><h3 style="margin:0">Heading three — subsection</h3></div>
<div class="row"><div class="spec">16 / 600</div><h4 style="margin:0">Heading four — card title</h4></div>
</body></html>
