<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Opacity Hierarchy</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 16px 20px; background: #1c1c20; color: #fff; font-family: var(--font-sans); }
  .row { display: flex; align-items: center; gap: 14px; padding: 7px 10px; border-radius: 6px; }
  .bar { width: 46px; height: 10px; border-radius: 2px; background: #fff; flex-shrink: 0; }
  .val { font-family: var(--font-mono); font-size: 11px; width: 48px; color: rgba(255,255,255,0.5); }
  .label { font-size: 13px; }
</style>
</head>
<body>
  <div class="row"><div class="bar" style="opacity:.93"></div><div class="val">0.93</div><div class="label" style="color:rgba(255,255,255,.93)">Active text — selected row, focused input</div></div>
  <div class="row"><div class="bar" style="opacity:.85"></div><div class="val">0.85</div><div class="label" style="color:rgba(255,255,255,.85)">Hover text — nav rows, buttons on hover</div></div>
  <div class="row"><div class="bar" style="opacity:.65"></div><div class="val">0.65</div><div class="label" style="color:rgba(255,255,255,.65)">Resting text — body, nav, secondary headings</div></div>
  <div class="row"><div class="bar" style="opacity:.55"></div><div class="val">0.55</div><div class="label" style="color:rgba(255,255,255,.55)">Resting icon</div></div>
  <div class="row"><div class="bar" style="opacity:.45"></div><div class="val">0.45</div><div class="label" style="color:rgba(255,255,255,.45)">Count / meta — "12", "2 min ago"</div></div>
  <div class="row"><div class="bar" style="opacity:.35"></div><div class="val">0.35</div><div class="label" style="color:rgba(255,255,255,.35)">Hint / placeholder</div></div>
</body>
</html>
